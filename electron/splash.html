<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09090b;
      color: #fafafa;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
    }
    .logo {
      max-width: 160px;
      height: auto;
      margin-bottom: 16px;
    }
    .title {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 12px;
      color: #71717a;
      margin-bottom: 32px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #27272a;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .status {
      margin-top: 16px;
      font-size: 11px;
      color: #52525b;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <img class="logo" src="assets/logo.png" alt="BumbaClaude">
  <div class="title">BumbaClaude</div>
  <div class="subtitle">Agent Orchestration</div>
  <div class="spinner"></div>
  <div class="status">Starting server...</div>
</body>
</html>
